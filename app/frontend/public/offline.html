<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Teez-Flexx Mobiles</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0B0B0B;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #D4AF37;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: #0B0B0B;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #D4AF37;
    }
    p {
      color: #8A8A8E;
      margin-bottom: 30px;
      max-width: 300px;
      line-height: 1.6;
    }
    .btn {
      background: #D4AF37;
      color: #0B0B0B;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: transparent;
      color: #D4AF37;
      border: 2px solid #D4AF37;
      margin-top: 12px;
    }
    .phone {
      margin-top: 30px;
      color: #8A8A8E;
      font-size: 14px;
    }
    .phone a {
      color: #D4AF37;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo">TF</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Teez-Flexx Mobiles requires an internet connection to browse products and book appointments.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <a href="tel:+27743376552" class="btn btn-secondary">Call Us: 074 337 6552</a>
  <p class="phone>
    Or WhatsApp us at <a href="https://wa.me/27743376552">074 337 6552</a>
  </p>
</body>
</html>
